<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站首页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 300px;
            height: auto;
        }

        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 250px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .copyright {
            text-align: center;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <!-- 这里替换为你实际的logo图片路径 -->
        <img src="your-logo-image-path.png" alt="TE品牌logo">
    </div>
    <div class="form-container">
        <div class="form-group">
            <label for="username">账号：</label>
            <input type="text" id="username" name="username">
        </div>
        <div class="form-group">
            <label for="password">密码：</label>
            <input type="password" id="password" name="password">
        </div>
    </div>
    <div class="copyright">
        © 2025 All Rights Reserved | Design by SMP
    </div>
</body>

</html>
